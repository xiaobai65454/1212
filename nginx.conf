# 小白白智能体 Nginx 配置
# 将此文件复制到 /etc/nginx/sites-available/xiaobaibai
# 然后执行: ln -s /etc/nginx/sites-available/xiaobaibai /etc/nginx/sites-enabled/
# 最后执行: nginx -t && nginx -s reload

server {
    listen 80;
    server_name your-domain.com;  # 替换为你的域名

    # 日志
    access_log /var/log/nginx/xiaobaibai.access.log;
    error_log /var/log/nginx/xiaobaibai.error.log;

    # 关键：禁用代理缓冲，确保 SSE 流式响应实时传输
    proxy_buffering off;
    proxy_cache off;
    proxy_read_timeout 300s;
    proxy_connect_timeout 60s;
    proxy_send_timeout 300s;

    # SSE 专用配置
    location /api/chat {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        
        # SSE 关键头
        proxy_set_header Connection '';
        proxy_set_header Cache-Control 'no-cache';
        proxy_set_header X-Accel-Buffering no;  # 禁用 Nginx 缓冲
        
        # 转发真实 IP
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 超时设置（SSE 长连接需要较长超时）
        proxy_read_timeout 300s;
        chunked_transfer_encoding off;
    }

    # 其他 API 路由
    location /api/ {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Accel-Buffering no;
    }

    # 静态文件和页面
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
    }
}
